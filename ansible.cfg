# ansible.cfg for aec-partner-onboarding
#
# This config is intentionally minimal. Most things should work with
# defaults; we only override what's specific to running the role from a
# laptop or from inside an AAP execution environment.

[defaults]
# Where to find the role
roles_path = ./roles

# Inventory location
inventory = ./inventory/hosts.yml

# Don't try to gather facts on hosts we're not really managing
gathering = explicit

# Cleaner output
stdout_callback = yaml
nocows = 1

# Caching not needed for this role
fact_caching = memory

# Stop on first failure (we don't want to half-onboard a partner)
any_errors_fatal = True

[ssh_connection]
# Not used (we're connecting to localhost), but set for cleanliness
pipelining = True

[privilege_escalation]
# We never sudo from this role
become = False
