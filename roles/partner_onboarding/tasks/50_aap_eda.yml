---
# ============================================================================
# PHASE 5 — AAP EDA (Event-Driven Ansible)
# ============================================================================
# Creates partner users in EDA Controller via direct REST API calls.
# We bypass the ansible.eda collection entirely because it has a known
# bug where resolve_name_to_id tries to int() a UUID on AAP 2.6.
# The uri module talks to the same REST API without the buggy abstraction.
# ============================================================================

- name: "[eda] Verify EDA admin credentials are present in environment"
  assert:
    that:
      - lookup('env', 'CONTROLLER_EDA_USERNAME') | length > 0
      - lookup('env', 'CONTROLLER_EDA_PASSWORD') | length > 0
    fail_msg: >
      CONTROLLER_EDA_USERNAME and CONTROLLER_EDA_PASSWORD must be set in
      the environment.

- name: "[eda] Preflight — confirm we can reach the EDA API"
  uri:
    url: "{{ aap_eda_url }}/api/eda/v1/"
    method: GET
    validate_certs: "{{ aap_validate_certs }}"
    status_code: [200, 301, 302, 401, 403, 404]
  register: eda_ping

- name: "[eda] Generate EDA passwords for partner users"
  set_fact:
    eda_users_with_pw: >-
      {{
        eda_users_with_pw | default([]) +
        [ item | combine({
            'eda_password': lookup('password', '/dev/null chars=ascii_letters,digits length=14')
          }) ]
      }}
  loop: "{{ partner_users }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: true

- name: "[eda] Check if user already exists in EDA"
  uri:
    url: "{{ aap_eda_url }}/api/eda/v1/users/?username={{ item.username }}"
    method: GET
    user: "{{ lookup('env', 'CONTROLLER_EDA_USERNAME') }}"
    password: "{{ lookup('env', 'CONTROLLER_EDA_PASSWORD') }}"
    force_basic_auth: true
    validate_certs: "{{ aap_validate_certs }}"
    status_code: [200]
  register: eda_user_check
  loop: "{{ eda_users_with_pw }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: true

- name: "[eda] Debug — user check results"
  debug:
    msg: "User {{ item.item.username }}: count={{ item.json.count | default('undefined') }}"
  loop: "{{ eda_user_check.results }}"
  loop_control:
    label: "{{ item.item.username }}"

- name: "[eda] Create partner users in EDA via REST API"
  uri:
    url: "{{ aap_eda_url }}/api/eda/v1/users/"
    method: POST
    user: "{{ lookup('env', 'CONTROLLER_EDA_USERNAME') }}"
    password: "{{ lookup('env', 'CONTROLLER_EDA_PASSWORD') }}"
    force_basic_auth: true
    validate_certs: "{{ aap_validate_certs }}"
    body_format: json
    body:
      username: "{{ item.0.username }}"
      password: "{{ item.0.eda_password }}"
      email: "{{ item.0.email }}"
      first_name: "{{ item.0.first_name }}"
      last_name: "{{ item.0.last_name }}"
      is_superuser: false
    status_code: [201]
  register: eda_create_result
  loop: "{{ eda_users_with_pw | zip(eda_user_check.results) | list }}"
  loop_control:
    label: "{{ item.0.username }}"
  when: item.1.json.count | default(0) == 0
  no_log: true
  changed_when: eda_create_result.status == 201
