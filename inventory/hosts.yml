---
# Inventory for the partner_onboarding role.
#
# Everything this role does is API calls to OpenShift, AAP Controller, and
# AAP EDA — none of which require a real "host" in the Ansible sense. The
# playbook just needs a localhost to run from. When invoked from AAP, this
# inventory is overridden by whatever the job template specifies, so the
# practical effect is the same: tasks run on the AAP execution environment
# pod, hitting the cluster APIs externally.

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
